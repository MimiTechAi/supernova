<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Swarm — Cognitive Supernova</title>
    <meta name="description" content="Massively parallel AI agent orchestration in real-time">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Vars ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep: #05060f;
            --bg-surface: #0a0d1a;
            --bg-card: rgba(14, 18, 36, 0.7);
            --bg-card-hover: rgba(20, 26, 50, 0.85);
            --border: rgba(99, 102, 241, 0.15);
            --border-active: rgba(99, 102, 241, 0.4);
            --text-primary: #e8eaed;
            --text-secondary: #8b8fa3;
            --text-muted: #555970;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --accent-bright: #818cf8;
            --success: #34d399;
            --success-glow: rgba(52, 211, 153, 0.2);
            --error: #f87171;
            --warning: #fbbf24;
            --timeout: #fb923c;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --gradient-bg: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                           radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                           radial-gradient(ellipse at 50% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-sm: 8px;
        }

        html { font-size: 15px; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--gradient-bg);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Animated Background Particles ──────────────────── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float-particle 8s infinite ease-in-out;
        }

        @keyframes float-particle {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            50% { transform: translateY(-10vh) scale(1); }
        }

        /* ── Layout ────────────────────────────────────────── */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── Header ────────────────────────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header__badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 1rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-bright);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1.2rem;
        }

        .header__badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .header__sub {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            margin-top: 0.6rem;
            line-height: 1.5;
        }

        /* ── Input Panel ───────────────────────────────────── */
        .input-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: border-color 0.3s ease;
        }

        .input-panel:focus-within {
            border-color: var(--border-active);
        }

        .input-panel__row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .input-panel__query {
            flex: 1;
        }

        .input-panel__query textarea {
            width: 100%;
            min-height: 80px;
            padding: 1rem 1.2rem;
            background: rgba(5, 6, 15, 0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-panel__query textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-panel__query textarea::placeholder {
            color: var(--text-muted);
        }

        .input-panel__controls {
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .control-group label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .control-group select,
        .control-group input[type="number"] {
            padding: 0.6rem 0.8rem;
            background: rgba(5, 6, 15, 0.6);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            outline: none;
            min-width: 100px;
            transition: border-color 0.3s;
        }

        .control-group select:focus,
        .control-group input[type="number"]:focus {
            border-color: var(--accent);
        }

        .control-group select option {
            background: var(--bg-surface);
        }

        /* ── Ignite Button ─────────────────────────────────── */
        .btn-ignite {
            position: relative;
            padding: 0.7rem 2rem;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
            min-width: 140px;
        }

        .btn-ignite:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-ignite:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-ignite:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-ignite::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            animation: none;
        }

        .btn-ignite.loading::after {
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            to { transform: translateX(100%); }
        }

        /* ── Status Bar ────────────────────────────────────── */
        .status-bar {
            display: none;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            backdrop-filter: blur(20px);
            flex-wrap: wrap;
        }

        .status-bar.visible { display: flex; }

        .status-bar__phase {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-bright);
            font-weight: 600;
        }

        .status-bar__spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-bar__stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
        }

        .status-bar__stat .value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .status-bar__progress {
            flex: 1;
            min-width: 150px;
            height: 4px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .status-bar__progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 2px;
            transition: width 0.4s ease;
            width: 0%;
        }

        /* ── Worker Grid ───────────────────────────────────── */
        .workers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .worker-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem 1.4rem;
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(15px) scale(0.97);
            animation: card-in 0.5s forwards;
        }

        .worker-card.success {
            border-color: rgba(52, 211, 153, 0.25);
            background: rgba(52, 211, 153, 0.03);
        }

        .worker-card.error, .worker-card.timeout {
            border-color: rgba(248, 113, 113, 0.25);
            background: rgba(248, 113, 113, 0.03);
        }

        .worker-card.pending {
            border-color: var(--border);
        }

        @keyframes card-in {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .worker-card__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .worker-card__id {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-bright);
        }

        .worker-card__status {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .worker-card__status.pending {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-bright);
        }

        .worker-card__status.working {
            background: rgba(251, 191, 36, 0.15);
            color: var(--warning);
        }

        .worker-card__status.success {
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
        }

        .worker-card__status.error,
        .worker-card__status.timeout {
            background: rgba(248, 113, 113, 0.15);
            color: var(--error);
        }

        .worker-card__status .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .worker-card__status.working .dot {
            animation: pulse-dot 1s infinite;
        }

        .worker-card__query {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .worker-card__result {
            display: none;
            font-size: 0.85rem;
            color: var(--text-primary);
            line-height: 1.55;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
            animation: fade-in 0.4s ease;
        }

        .worker-card__result.visible { display: block; }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .worker-card__meta {
            display: none;
            gap: 1rem;
            margin-top: 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        .worker-card__meta.visible { display: flex; flex-wrap: wrap; }

        .worker-card__meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* ── Summary Panel ─────────────────────────────────── */
        .summary {
            display: none;
            background: var(--bg-card);
            border: 1px solid rgba(52, 211, 153, 0.25);
            border-radius: var(--radius-lg);
            padding: 2rem;
            backdrop-filter: blur(20px);
            animation: card-in 0.6s forwards;
        }

        .summary.visible { display: block; }

        .summary h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, var(--success), #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary__grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
        }

        .summary__stat {
            text-align: center;
            padding: 1rem;
            background: rgba(5, 6, 15, 0.4);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .summary__stat-value {
            font-family: var(--font-mono);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .summary__stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        .summary__stat-value.cost {
            color: var(--success);
        }

        .summary__stat-value.time {
            color: var(--accent-bright);
        }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .input-panel__controls { flex-direction: column; }
            .workers-grid { grid-template-columns: 1fr; }
            .summary__grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── Presets Section ───────────────────────────────── */
        .presets {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .preset-chip {
            padding: 0.35rem 0.8rem;
            background: rgba(99, 102, 241, 0.06);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-chip:hover {
            background: rgba(99, 102, 241, 0.12);
            border-color: var(--border-active);
            color: var(--accent-bright);
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="particles" id="particles"></div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header__badge">
                <span>NVIDIA NIM Powered</span>
            </div>
            <h1>Liquid Swarm</h1>
            <p class="header__sub">
                Cognitive Supernova — Massively parallel AI analysis in real-time
            </p>
        </header>

        <!-- Input Panel -->
        <section class="input-panel">
            <div class="presets">
                <button class="preset-chip" data-query="Analyze the global AI market: size, growth, top players and trends 2025">🤖 AI Market 2025</button>
                <button class="preset-chip" data-query="Create a competitive analysis of the major cloud providers: AWS, Azure, GCP">☁️ Cloud Wars</button>
                <button class="preset-chip" data-query="Analyze the European electric vehicle market: market shares, trends, regulation">🚗 EV Europe</button>
                <button class="preset-chip" data-query="Evaluate the potential of quantum computing for the financial industry">⚛️ Quantum Finance</button>
                <button class="preset-chip" data-query="Analyze the cybersecurity threat landscape 2025 for mid-size enterprises">🛡️ Cybersecurity</button>
            </div>

            <div class="input-panel__row">
                <div class="input-panel__query">
                    <textarea id="queryInput" placeholder="Describe your analysis task... e.g. 'Analyze the global AI market in 2025: size, growth, top players, trends and risks'" rows="3"></textarea>
                </div>
            </div>

            <div class="input-panel__controls">
                <div class="control-group">
                    <label>Worker</label>
                    <input type="number" id="numTasks" value="8" min="2" max="30" step="1">
                </div>
                <div class="control-group">
                    <label>Model</label>
                    <select id="modelTier">
                        <option value="BUDGET">⚡ Llama 8B — $0.0003</option>
                        <option value="STANDARD">🔥 Llama 70B — $0.002</option>
                        <option value="PREMIUM">💎 Nemotron 70B — $0.005</option>
                    </select>
                </div>
                <button class="btn-ignite" id="igniteBtn" onclick="igniteSwarm()">
                    🚀 IGNITE
                </button>
            </div>
        </section>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <div class="status-bar__phase" id="phaseLabel">
                <div class="status-bar__spinner" id="spinner"></div>
                <span id="phaseText">Initializing...</span>
            </div>
            <div class="status-bar__stat">
                Workers: <span class="value" id="completedCount">0</span>/<span class="value" id="totalCount">0</span>
            </div>
            <div class="status-bar__stat">
                Cost: <span class="value" id="runningCost">$0.0000</span>
            </div>
            <div class="status-bar__progress">
                <div class="status-bar__progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Worker Grid -->
        <div class="workers-grid" id="workersGrid"></div>

        <!-- Summary Panel -->
        <div class="summary" id="summary">
            <h2>✅ Swarm Complete</h2>
            <div class="summary__grid">
                <div class="summary__stat">
                    <div class="summary__stat-value time" id="sumTime">—</div>
                    <div class="summary__stat-label">Seconds</div>
                </div>
                <div class="summary__stat">
                    <div class="summary__stat-value cost" id="sumCost">—</div>
                    <div class="summary__stat-label">Total Cost</div>
                </div>
                <div class="summary__stat">
                    <div class="summary__stat-value" id="sumWorkers">—</div>
                    <div class="summary__stat-label">Workers</div>
                </div>
                <div class="summary__stat">
                    <div class="summary__stat-value" id="sumRate">—</div>
                    <div class="summary__stat-label">Success Rate</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Particle Background ──────────────────────────────
        (function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.animationDuration = (6 + Math.random() * 6) + 's';
                p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
                container.appendChild(p);
            }
        })();

        // ── Preset Chips ─────────────────────────────────────
        document.querySelectorAll('.preset-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.getElementById('queryInput').value = chip.dataset.query;
                document.getElementById('queryInput').focus();
            });
        });

        // ── State ────────────────────────────────────────────
        let tasks = {};
        let totalCost = 0;
        let successCount = 0;

        // ── Main: Ignite the Swarm ───────────────────────────
        async function igniteSwarm() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                document.getElementById('queryInput').focus();
                return;
            }

            const numTasks = parseInt(document.getElementById('numTasks').value);
            const modelTier = document.getElementById('modelTier').value;

            // Reset UI
            const btn = document.getElementById('igniteBtn');
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '⏳ RUNNING...';

            document.getElementById('workersGrid').innerHTML = '';
            document.getElementById('summary').classList.remove('visible');
            document.getElementById('statusBar').classList.add('visible');
            document.getElementById('completedCount').textContent = '0';
            document.getElementById('totalCount').textContent = '?';
            document.getElementById('runningCost').textContent = '$0.0000';
            document.getElementById('progressFill').style.width = '0%';
            tasks = {};
            totalCost = 0;
            successCount = 0;

            try {
                const response = await fetch('/api/ignite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        num_tasks: numTasks,
                        model_tier: modelTier,
                    }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Parse SSE events
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line

                    let eventType = '';
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            eventType = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            handleEvent(eventType, data);
                        }
                    }
                }
            } catch (err) {
                console.error('Stream error:', err);
                document.getElementById('phaseText').textContent = `Error: ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = '🚀 IGNITE';
            }
        }

        // ── Event Handlers ───────────────────────────────────
        function handleEvent(type, data) {
            switch (type) {
                case 'phase':
                    document.getElementById('phaseText').textContent = data.message;
                    break;

                case 'tasks':
                    handleTasksList(data);
                    break;

                case 'result':
                    handleWorkerResult(data);
                    break;

                case 'complete':
                    handleComplete(data);
                    break;

                case 'error':
                    document.getElementById('phaseText').textContent = `❌ ${data.message}`;
                    break;
            }
        }

        function handleTasksList(data) {
            const grid = document.getElementById('workersGrid');
            document.getElementById('totalCount').textContent = data.tasks.length;

            data.tasks.forEach((task, i) => {
                tasks[task.id] = task;

                const card = document.createElement('div');
                card.className = 'worker-card pending';
                card.id = `card-${task.id}`;
                card.style.animationDelay = `${i * 60}ms`;
                card.innerHTML = `
                    <div class="worker-card__header">
                        <span class="worker-card__id">${task.id}</span>
                        <span class="worker-card__status working">
                            <span class="dot"></span>
                            Working
                        </span>
                    </div>
                    <div class="worker-card__query">${escapeHtml(task.query)}</div>
                    <div class="worker-card__result" id="result-${task.id}"></div>
                    <div class="worker-card__meta" id="meta-${task.id}"></div>
                `;
                grid.appendChild(card);
            });
        }

        function handleWorkerResult(data) {
            const card = document.getElementById(`card-${data.task_id}`);
            if (!card) return;

            // Update status
            card.className = `worker-card ${data.status}`;
            const statusEl = card.querySelector('.worker-card__status');
            const statusLabels = {
                success: '✓ Done',
                error: '✗ Error',
                timeout: '⏱ Timeout',
            };
            statusEl.className = `worker-card__status ${data.status}`;
            statusEl.innerHTML = `<span class="dot"></span>${statusLabels[data.status] || data.status}`;

            // Show result
            const resultEl = document.getElementById(`result-${data.task_id}`);
            if (data.status === 'success') {
                resultEl.textContent = data.data.result || '';
                successCount++;
            } else {
                resultEl.textContent = data.data.error || 'Unknown error';
                resultEl.style.color = 'var(--error)';
            }
            resultEl.classList.add('visible');

            // Show meta
            const metaEl = document.getElementById(`meta-${data.task_id}`);
            if (data.data.latency_seconds) {
                metaEl.innerHTML = `
                    <span>⏱ ${data.data.latency_seconds}s</span>
                    <span>📥 ${data.data.prompt_tokens || '?'} tok</span>
                    <span>📤 ${data.data.completion_tokens || '?'} tok</span>
                    <span>💰 $${data.cost_usd.toFixed(4)}</span>
                `;
                metaEl.classList.add('visible');
            }

            // Update counters
            totalCost += data.cost_usd;
            document.getElementById('completedCount').textContent = data.completed;
            document.getElementById('runningCost').textContent = `$${totalCost.toFixed(4)}`;

            const pct = (data.completed / data.total) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
        }

        function handleComplete(data) {
            document.getElementById('phaseText').textContent = '✅ Swarm complete';
            document.getElementById('spinner').style.display = 'none';

            const summary = document.getElementById('summary');
            document.getElementById('sumTime').textContent = data.total_time + 's';
            document.getElementById('sumCost').textContent = '$' + data.total_cost.toFixed(4);
            document.getElementById('sumWorkers').textContent = data.total_tasks;
            document.getElementById('sumRate').textContent =
                Math.round((successCount / data.total_tasks) * 100) + '%';

            summary.classList.add('visible');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Enter key to ignite ──────────────────────────────
        document.getElementById('queryInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                igniteSwarm();
            }
        });
    </script>
</body>
</html>
